name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version number (e.g. 1.3.0)
        required: true
        type: string
      release_notes:
        description: "Optional release notes (fallback: auto-generated notes)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Normalize and validate version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          RAW_VERSION="$INPUT_VERSION"
          NORMALIZED="${RAW_VERSION#v}"
          TAG="v$NORMALIZED"

          if [[ ! "$NORMALIZED" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: $RAW_VERSION"
            echo "Expected format: 1.2.3"
            exit 1
          fi

          CURRENT_VERSION="$(node -p "require('./package.json').version")"

          # Simple version comparison
          if [ "$NORMALIZED" = "$CURRENT_VERSION" ]; then
            echo "❌ Version $NORMALIZED is the same as current ($CURRENT_VERSION)"
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "❌ Tag $TAG already exists"
            exit 1
          fi

          echo "version=$NORMALIZED" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "✅ Version $NORMALIZED validated"

      - name: Bump package version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version

      - name: Lint
        run: npm run lint

      - name: Build Chrome
        run: npm run build

      - name: Build Firefox
        run: npm run build:firefox

      - name: Package release zips
        id: package
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |

          # --- Chrome zip ---
          CHROME_DIR="release-chrome"
          mkdir -p "$CHROME_DIR/extension" "$CHROME_DIR/host"

          # Copy built extension
          cp -r .output/chrome-mv3/* "$CHROME_DIR/extension/"

          # Copy host files (only what the user needs)
          cp host/host.py "$CHROME_DIR/host/"
          cp host/install_host.bat "$CHROME_DIR/host/"
          cp host/run_host.bat "$CHROME_DIR/host/"

          # Copy README
          cp README.md "$CHROME_DIR/"

          CHROME_ZIP="YouDL-v${VERSION}-chrome.zip"
          (cd "$CHROME_DIR" && zip -r "../$CHROME_ZIP" .)
          echo "chrome_zip=$CHROME_ZIP" >> "$GITHUB_OUTPUT"

          # --- Firefox zip ---
          FIREFOX_DIR="release-firefox"
          mkdir -p "$FIREFOX_DIR/extension" "$FIREFOX_DIR/host"

          cp -r .output/firefox-mv2/* "$FIREFOX_DIR/extension/"
          cp host/host.py "$FIREFOX_DIR/host/"
          cp host/install_host.bat "$FIREFOX_DIR/host/"
          cp host/run_host.bat "$FIREFOX_DIR/host/"
          cp README.md "$FIREFOX_DIR/"

          FIREFOX_ZIP="YouDL-v${VERSION}-firefox.zip"
          (cd "$FIREFOX_DIR" && zip -r "../$FIREFOX_ZIP" .)
          echo "firefox_zip=$FIREFOX_ZIP" >> "$GITHUB_OUTPUT"

          echo "✅ Packaged: $CHROME_ZIP ($( du -h "$CHROME_ZIP" | cut -f1 ))"
          echo "✅ Packaged: $FIREFOX_ZIP ($( du -h "$FIREFOX_ZIP" | cut -f1 ))"

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json

          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore(release): bump version to $VERSION"
          fi

      - name: Push commit and tag
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: YouDL ${{ steps.version.outputs.tag }}
          generate_release_notes: ${{ github.event.inputs.release_notes == '' }}
          body: ${{ github.event.inputs.release_notes }}
          files: |
            ${{ steps.package.outputs.chrome_zip }}
            ${{ steps.package.outputs.firefox_zip }}
